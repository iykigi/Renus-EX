<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>renus Exchange | پلاتفۆرمی نرخی دراو</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Readex+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Readex Pro', sans-serif; box-sizing: border-box; margin:0; padding:0; }
  .mono { font-family: 'IBM Plex Mono', monospace !important; }
  body { background: #f0f4fa; color: #0f172a; }

  @keyframes livePulse {
    0%,100%{ transform:scale(1); box-shadow:0 0 0 0 rgba(16,185,129,.5); }
    50%{ transform:scale(1.2); box-shadow:0 0 0 5px rgba(16,185,129,0); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes popPrice {
    0%,100%{ transform:scale(1); }
    50%    { transform:scale(1.07); }
  }

  .card-in  { animation: fadeUp .35s ease forwards; opacity:0; }
  .flash    { animation: popPrice .3s ease; }

  .kcard {
    background:#fff;
    border: 1.5px solid #e4e9f2;
    border-radius:18px;
    overflow:hidden;
    transition: border-color .2s, box-shadow .2s, transform .2s;
  }
  .kcard:hover {
    border-color:#2563eb;
    box-shadow: 0 8px 28px -6px rgba(37,99,235,.13);
    transform: translateY(-2px);
  }

  .pct-up   { background:#f0fdf4; color:#16a34a; border:1px solid #bbf7d0; }
  .pct-down { background:#fef2f2; color:#dc2626; border:1px solid #fecaca; }
  .pct-flat { background:#f8fafc; color:#64748b; border:1px solid #e2e8f0; }

  .rbar      { height:4px; background:#e8ecf3; border-radius:4px; overflow:hidden; }
  .rbar-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,#3b82f6,#60a5fa); transition:width .5s; }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; }
  input[type=number] { -moz-appearance:textfield; }
  select { -webkit-appearance:none; appearance:none; }

  ::-webkit-scrollbar { width:5px; }
  ::-webkit-scrollbar-track { background:#f1f5f9; }
  ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:4px; }
</style>
</head>
<body class="min-h-screen">
<div class="max-w-[1300px] mx-auto px-4 py-5 md:px-7 md:py-7 flex flex-col gap-5">

  <!-- هێدەر -->
  <header class="bg-white border border-[#e4e9f2] rounded-2xl px-5 py-3 flex items-center justify-between shadow-sm">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-[12px] bg-gradient-to-br from-[#2563eb] to-[#1d4ed8] flex items-center justify-center text-white font-bold text-sm shadow-[0_4px_12px_rgba(37,99,235,.3)]">KX</div>
      <div>
        <div class="font-bold text-[15px] leading-tight">renus Exchange</div>
        <div class="text-[10px] text-[#94a3b8] mt-0.5">پلاتفۆرمی نرخی دراو</div>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <div class="flex items-center gap-1.5 bg-[#f0fdf4] border border-[#bbf7d0] rounded-full px-3 py-1.5 text-[11px] font-semibold text-[#16a34a]">
        <span class="w-1.5 h-1.5 rounded-full bg-[#10b981] inline-block" style="animation:livePulse 1.8s infinite"></span>
        ڕاستەوخۆ
      </div>
      <div class="hidden sm:block mono text-[11px] text-[#64748b] bg-[#f8fafc] border border-[#e4e9f2] rounded-full px-3 py-1.5" id="clock">--:--:--</div>
    </div>
  </header>

  <!-- کۆنڤێرتەر -->
  <div class="bg-white border border-[#e4e9f2] rounded-2xl shadow-sm overflow-hidden">
    <div class="px-5 py-3.5 border-b border-[#f1f5f9] flex items-center gap-2">
      <svg class="w-4 h-4 text-[#2563eb] flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="2.2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21 3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5 4.5 4.5m0 0L16.5 12M21 7.5H7.5"/></svg>
      <span class="font-bold text-[13px]">گۆڕینی دراو</span>
    </div>
    <div class="p-5">
      <div class="flex flex-col sm:flex-row gap-3 items-stretch sm:items-center">
        <div class="flex gap-2 flex-1 items-center bg-[#f8fafc] border border-[#e4e9f2] rounded-[14px] px-3 focus-within:border-[#2563eb] focus-within:ring-2 focus-within:ring-[#dbeafe] transition-all">
          <input class="flex-1 bg-transparent outline-none mono font-semibold text-base py-2.5 ltr text-left min-w-0" id="fromAmount" type="number" value="100" min="0" step="any" oninput="convert()">
          <select class="bg-transparent outline-none font-semibold text-[13px] cursor-pointer text-[#2563eb]" id="fromCurrency" onchange="convert()"></select>
        </div>
        <button onclick="swapCurrencies()" class="w-9 h-9 rounded-full bg-[#eff6ff] border border-[#bfdbfe] text-[#2563eb] flex items-center justify-center mx-auto flex-shrink-0 transition-all duration-300 hover:bg-[#2563eb] hover:text-white hover:rotate-180">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
  <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12c0-1.232-.046-2.453-.138-3.662a4.006 4.006 0 0 0-3.7-3.7 48.678 48.678 0 0 0-7.324 0 4.006 4.006 0 0 0-3.7 3.7c-.017.22-.032.441-.046.662M19.5 12l3-3m-3 3-3-3m-12 3c0 1.232.046 2.453.138 3.662a4.006 4.006 0 0 0 3.7 3.7 48.656 48.656 0 0 0 7.324 0 4.006 4.006 0 0 0 3.7-3.7c.017-.22.032-.441.046-.662M4.5 12l3 3m-3-3-3 3" />
</svg>

        </button>
        <div class="flex gap-2 flex-1 items-center bg-[#eff6ff] border border-[#bfdbfe] rounded-[14px] px-3 transition-all">
          <input class="flex-1 bg-transparent outline-none mono font-bold text-base py-2.5 ltr text-left min-w-0 text-[#2563eb]" id="toAmount" readonly placeholder="ئەنجام">
          <select class="bg-transparent outline-none font-semibold text-[13px] cursor-pointer text-[#2563eb]" id="toCurrency" onchange="convert()"></select>
        </div>
      </div>
      <div class="mt-3 bg-[#f8fafc] border border-[#e4e9f2] rounded-[14px] px-4 py-2.5 text-center text-[12px] text-[#64748b]" id="resultLabel">
        ئەنجامەکە لێرەدا دەرکەوێت...
      </div>
    </div>
  </div>

  <!-- سەردێڕ -->
  <div class="flex items-center justify-between">
    <div class="flex items-center gap-2 font-bold text-[14px]">
      <svg class="w-4 h-4 text-[#2563eb]" fill="none" viewBox="0 0 24 24" stroke-width="2.2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z"/></svg>
      نرخی دراوەکان
    </div>
    <span class="mono text-[11px] text-[#94a3b8] bg-white border border-[#e4e9f2] rounded-full px-3 py-1.5" id="lastUpdate">—</span>
  </div>

  <!-- گرید -->
  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3" id="cardsGrid"></div>

  <!-- فوتەر -->
  <footer class="bg-white border border-[#e4e9f2] rounded-2xl px-5 py-3 flex items-center justify-between text-[11px] text-[#94a3b8]">
    <span>© 2026 renus Exchange</span>
    <div class="flex items-center gap-2">
      <span class="w-1.5 h-1.5 bg-[#10b981] rounded-full animate-pulse"></span>
      <span id="footerUpdate">نوێکرایەوە: —</span>
    </div>
  </footer>
</div>

<script>
const CURRENCIES = [
  { code:'USD', name:'دۆلاری ئەمریکی',   iso:'us', buy:100,      sell:100      },
  { code:'IQD', name:'دیناری عێراق',      iso:'iq', buy:154300,   sell:154800   },
  { code:'EUR', name:'یۆرۆ',             iso:'eu', buy:116.07,   sell:117.23   },
  { code:'GBP', name:'پاوەندی بەریتانیا', iso:'gb', buy:131.75,   sell:133.25   },
  { code:'TRY', name:'لیرەی تورکیا',      iso:'tr', buy:4550,     sell:4350     },
  { code:'IRR', name:'ڕیالی ئێران',       iso:'ir', buy:18000000, sell:10000000 },
  { code:'NOK', name:'کرۆنی نەرویژ',      iso:'no', buy:83,       sell:86       },
  { code:'SEK', name:'کرۆنی سوید',        iso:'se', buy:95.5,     sell:99       },
  { code:'JOD', name:'دیناری ئوردن',      iso:'jo', buy:71,       sell:69       },
  { code:'SAR', name:'ڕیالی سعودیە',      iso:'sa', buy:375,      sell:377      },
  { code:'AED', name:'درھەمی ئیمارات',    iso:'ae', buy:367,      sell:369      },
  { code:'CAD', name:'دۆلاری کەنەدا',     iso:'ca', buy:135,      sell:137      },
  { code:'AUD', name:'دۆلاری ئوسترالیا',  iso:'au', buy:152,      sell:154      },
  { code:'CHF', name:'فرانکی سویسرا',     iso:'ch', buy:88,       sell:89       },
  { code:'QAR', name:'ڕیالی قەتەر',       iso:'qa', buy:364,      sell:365      },
  { code:'DKK', name:'کرۆنی دانمارک',     iso:'dk', buy:692,      sell:695      },
  { code:'KWD', name:'دیناری کوێت',       iso:'kw', buy:31,       sell:32       },
  { code:'SYP', name:'پاوەندی سووریا',    iso:'sy', buy:250000,   sell:251000   }
];

function genHistory(base) {
  const pts = [base];
  for (let i = 1; i < 14; i++) {
    const p = pts[i-1], d = p * (Math.random() - 0.47) * 0.014;
    pts.push(+(p + d).toFixed(p > 1000 ? 0 : 2));
  }
  return pts;
}

let currencies = CURRENCIES.map(c => ({
  ...c,
  buyLive:  c.buy,
  sellLive: c.sell,
  buyOpen:  c.buy,
  weekHigh: +(c.buy * 1.028).toFixed(c.buy > 1000 ? 0 : 2),
  weekLow:  +(c.buy * 0.972).toFixed(c.buy > 1000 ? 0 : 2),
  history:  genHistory(c.buy)
}));

function fmt(n) {
  if (n === undefined || isNaN(n)) return '—';
  if (n >= 1e6) return Math.round(n).toLocaleString('en-US');
  if (n >= 1e3) return n.toLocaleString('en-US', { maximumFractionDigits: n % 1 === 0 ? 0 : 2 });
  if (n % 1 !== 0) return n.toFixed(2);
  return String(n);
}

function calcPct(live, open) {
  if (!open) return 0;
  return ((live - open) / open) * 100;
}
function pctLabel(pct) {
  return (pct > 0 ? '+' : '') + pct.toFixed(2) + '%';
}
function pctClass(pct) {
  if (pct > 0.001) return 'pct-up';
  if (pct < -0.001) return 'pct-down';
  return 'pct-flat';
}
function pctArrow(pct) {
  if (pct > 0.001) return '▲';
  if (pct < -0.001) return '▼';
  return '—';
}

function drawSpark(id, history) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  const mn = Math.min(...history), mx = Math.max(...history), rng = mx - mn || 1;
  const pad = { t:3, b:3, l:2, r:2 };
  const iW = W - pad.l - pad.r, iH = H - pad.t - pad.b;
  const pts = history.map((v, i) => ({
    x: pad.l + (i / (history.length - 1)) * iW,
    y: pad.t + (1 - (v - mn) / rng) * iH
  }));
  const isUp = history[history.length-1] >= history[0];
  const colMain = isUp ? '#16a34a' : '#dc2626';
  const g = ctx.createLinearGradient(0, pad.t, 0, H);
  g.addColorStop(0, isUp ? 'rgba(22,163,74,.18)' : 'rgba(220,38,38,.14)');
  g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.moveTo(pts[0].x, H);
  ctx.lineTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) {
    const mx2 = (pts[i-1].x + pts[i].x) / 2;
    ctx.bezierCurveTo(mx2, pts[i-1].y, mx2, pts[i].y, pts[i].x, pts[i].y);
  }
  ctx.lineTo(pts[pts.length-1].x, H);
  ctx.closePath();
  ctx.fillStyle = g; ctx.fill();
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) {
    const mx2 = (pts[i-1].x + pts[i].x) / 2;
    ctx.bezierCurveTo(mx2, pts[i-1].y, mx2, pts[i].y, pts[i].x, pts[i].y);
  }
  ctx.strokeStyle = colMain; ctx.lineWidth = 1.6; ctx.lineJoin = 'round'; ctx.stroke();
  const lp = pts[pts.length - 1];
  ctx.beginPath(); ctx.arc(lp.x, lp.y, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = colMain; ctx.fill();
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();
}

function renderCards() {
  const list = currencies.filter(c => c.code !== 'USD');
  document.getElementById('cardsGrid').innerHTML = list.map((c, i) => {
    const pct    = calcPct(c.buyLive, c.buyOpen);
    const rng    = c.weekHigh - c.weekLow || 1;
    const barPct = Math.min(100, Math.max(0, ((c.buyLive - c.weekLow) / rng) * 100));
    return `
    <div class="kcard card-in" data-code="${c.code}" style="animation-delay:${i * 0.04}s">

      <!-- سەر: ئاڵا + ناو + لە سەدا + چارت -->
      <div class="flex items-center gap-3 px-4 pt-4 pb-3 border-b border-[#f1f5f9]">
        <div class="w-12 h-8 rounded-[8px] overflow-hidden border border-[#e4e9f2] flex-shrink-0 shadow-sm">
          <img src="https://flagcdn.com/w80/${c.iso}.png" alt="${c.code}" class="w-full h-full object-cover"
               onerror="this.parentElement.style.background='#f1f5f9';this.remove()">
        </div>
        <div class="flex-1 min-w-0">
          <div class="font-semibold text-[13px] leading-tight truncate">${c.name}</div>
          <div class="mono text-[10px] text-[#94a3b8] mt-0.5">${c.code} · بەرامبەر ١٠٠$</div>
        </div>
        <div class="flex flex-col items-end gap-1.5 flex-shrink-0">
          <span class="mono text-[11px] font-bold px-2 py-0.5 rounded-full flex items-center gap-1 ${pctClass(pct)}" id="pct-${c.code}">
            <span>${pctArrow(pct)}</span><span>${pctLabel(pct)}</span>
          </span>
          <canvas id="spark-${c.code}" width="72" height="26"></canvas>
        </div>
      </div>

      <!-- کڕین / فرۆشتن -->
      <div class="px-4 py-3 flex gap-2">
        <div class="flex-1 bg-[#eff6ff] border border-[#bfdbfe] rounded-[12px] px-3 py-2.5 text-center">
          <div class="text-[10px] font-semibold text-[#2563eb] mb-1 flex items-center justify-center gap-1">
            <svg class="w-2.5 h-2.5" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m19.5 4.5-15 15m0 0h11.25m-11.25 0V8.25"/></svg>
            کڕین
          </div>
          <div class="mono font-bold text-[16px] text-[#2563eb] ltr" id="buy-${c.code}">${fmt(c.buyLive)}</div>
        </div>
        <div class="flex-1 bg-[#fef2f2] border border-[#fecaca] rounded-[12px] px-3 py-2.5 text-center">
          <div class="text-[10px] font-semibold text-[#dc2626] mb-1 flex items-center justify-center gap-1">
            فرۆشتن
            <svg class="w-2.5 h-2.5" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 19.5 19.5 4.5m0 0H8.25m11.25 0v11.25"/></svg>
          </div>
          <div class="mono font-bold text-[16px] text-[#dc2626] ltr" id="sell-${c.code}">${fmt(c.sellLive)}</div>
        </div>
      </div>

      <!-- بارەکەی مێژوو -->
      <div class="px-4 pb-4">
        <div class="flex justify-between mono text-[9.5px] text-[#94a3b8] mb-1.5">
          <span class="text-[#ef4444]">↓ ${fmt(c.weekLow)}</span>
          <span>مێژووی ٧ ڕۆژ</span>
          <span class="text-[#10b981]">↑ ${fmt(c.weekHigh)}</span>
        </div>
        <div class="rbar"><div class="rbar-fill" id="rbar-${c.code}" style="width:${barPct}%"></div></div>
      </div>
    </div>`;
  }).join('');

  requestAnimationFrame(() => {
    list.forEach(c => drawSpark(`spark-${c.code}`, c.history));
  });
}

function updatePrices() {
  currencies.forEach(c => {
    if (c.code === 'USD') return;
    const buyEl  = document.getElementById(`buy-${c.code}`);
    const sellEl = document.getElementById(`sell-${c.code}`);
    const pctEl  = document.getElementById(`pct-${c.code}`);
    const rEl    = document.getElementById(`rbar-${c.code}`);
    if (!buyEl) return;

    buyEl.textContent  = fmt(c.buyLive);
    sellEl.textContent = fmt(c.sellLive);
    buyEl.classList.remove('flash');
    void buyEl.offsetWidth;
    buyEl.classList.add('flash');

    if (pctEl) {
      const pct = calcPct(c.buyLive, c.buyOpen);
      pctEl.className = `mono text-[11px] font-bold px-2 py-0.5 rounded-full flex items-center gap-1 ${pctClass(pct)}`;
      pctEl.innerHTML = `<span>${pctArrow(pct)}</span><span>${pctLabel(pct)}</span>`;
    }

    drawSpark(`spark-${c.code}`, c.history);

    if (rEl) {
      const rng = c.weekHigh - c.weekLow || 1;
      rEl.style.width = Math.min(100, Math.max(0, ((c.buyLive - c.weekLow) / rng) * 100)) + '%';
    }
  });
}

function populateConverter() {
  ['fromCurrency', 'toCurrency'].forEach(id => {
    const sel = document.getElementById(id);
    sel.innerHTML = '';
    currencies.forEach(c => { sel.innerHTML += `<option value="${c.code}">${c.code}</option>`; });
  });
  document.getElementById('fromCurrency').value = 'USD';
  document.getElementById('toCurrency').value   = 'IQD';
  convert();
}

function convert() {
  const amt  = parseFloat(document.getElementById('fromAmount').value) || 0;
  const fC   = document.getElementById('fromCurrency').value;
  const tC   = document.getElementById('toCurrency').value;
  const from = currencies.find(c => c.code === fC);
  const to   = currencies.find(c => c.code === tC);
  if (!from || !to) return;
  let res;
  if (fC === tC)         res = amt;
  else if (fC === 'USD') res = (amt * to.buyLive) / 100;
  else if (tC === 'USD') res = (amt / from.buyLive) * 100;
  else { const u = (amt / from.buyLive) * 100; res = (u * to.buyLive) / 100; }
  document.getElementById('toAmount').value = fmt(res);
  document.getElementById('resultLabel').innerHTML =
    `<span class="text-[#475569]">${fmt(amt)} ${fC}</span> <span class="text-[#94a3b8] mx-1">=</span> <strong class="text-[#2563eb]">${fmt(res)} ${tC}</strong>`;
}

function swapCurrencies() {
  const f = document.getElementById('fromCurrency');
  const t = document.getElementById('toCurrency');
  [f.value, t.value] = [t.value, f.value];
  convert();
}

function liveTick() {
  currencies = currencies.map(c => {
    if (c.code === 'USD') return c;
    const d   = (Math.random() - 0.5) * 0.003;
    const big = ['IRR','SYP','IQD'].includes(c.code);
    const newBuy  = big ? Math.round(c.buyLive * (1+d)) : +(c.buyLive * (1+d)).toFixed(c.buyLive > 100 ? 0 : 2);
    const newSell = big ? Math.round(c.sellLive * (1+d*.8)) : +(c.sellLive * (1+d*.8)).toFixed(c.sellLive > 100 ? 0 : 2);
    return {
      ...c,
      buyLive:  newBuy,
      sellLive: newSell,
      weekHigh: Math.max(c.weekHigh, newBuy),
      weekLow:  Math.min(c.weekLow,  newBuy),
      history:  [...c.history.slice(1), newBuy]
    };
  });
  updatePrices();
  convert();
  const t = new Date().toLocaleTimeString('en-GB');
  document.getElementById('lastUpdate').textContent   = t;
  document.getElementById('footerUpdate').textContent = 'نوێکرایەوە: ' + t;
}

function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-GB');
}

renderCards();
populateConverter();
setInterval(liveTick, 5000);
setInterval(updateClock, 1000);
